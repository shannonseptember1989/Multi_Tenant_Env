---
# =============================================================================
# WORKFLOW 1 OF 2  |  Provision EKS Cluster
# =============================================================================
# Calls Ansible Playbook 1 which uses Terraform to provision:
#   VPC, subnets, NAT Gateway, EKS control plane, node groups,
#   IAM roles, EBS CSI driver, ECR repository.
#
# HOW OIDC AUTH WORKS (no stored credentials)
#   1. Job requests a signed JWT from GitHub's OIDC token endpoint
#   2. aws-actions sends it to AWS STS via AssumeRoleWithWebIdentity
#   3. AWS validates it against the registered GitHub OIDC provider in IAM
#   4. AWS returns temporary credentials (1hr TTL) — written to AWS_* env vars
#   5. Terraform and boto3 pick them up automatically
#
# MANUAL TRIGGERS
# ---------------
# Each environment (dev, staging, prod) has its own dedicated workflow_dispatch
# trigger so jobs can be run independently from the GitHub Actions UI.
# To trigger a specific environment:
#   1. Go to Actions -> "1 - Provision EKS" -> Run workflow
#   2. Select the environment and choose plan-only or apply
#   3. Click "Run workflow"
#
# Prod always requires a manual approval from a reviewer configured in
# Settings -> Environments -> prod -> Required Reviewers before it runs.
#
# AUTOMATIC TRIGGERS
# ------------------
# Pull requests run a plan-only check across all changed environments.
# No automatic apply ever happens — all applies are manual.
#
# REQUIRED SECRETS:   AWS_ROLE_ARN
# REQUIRED VARIABLES: AWS_REGION
# =============================================================================

name: "1 - Provision EKS"

on:
  # ---------------------------------------------------------------------------
  # MANUAL TRIGGER — Dev
  # Run this to plan or apply changes to the dev EKS cluster independently.
  # Safe to run at any time — set apply to false for a plan-only dry run.
  # ---------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to provision"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      apply:
        description: "Apply changes? (false = plan only, always safe to run)"
        required: true
        type: boolean
        default: false
      reason:
        description: "Reason for this run (optional — logged for audit trail)"
        required: false
        type: string
        default: "Manual trigger"

  # ---------------------------------------------------------------------------
  # AUTOMATIC — Pull requests run plan-only across all changed environments.
  # No changes are ever applied automatically. This lets you review the
  # Terraform plan output in the PR before merging.
  # ---------------------------------------------------------------------------
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "ansible/roles/provision_eks/**"
      - "ansible/environments/**"
      - "ansible/playbook-eks.yml"

# OIDC requires id-token: write so the job can request a JWT from GitHub.
# contents: read allows the checkout action to clone the repository.
permissions:
  id-token: write
  contents: read

# Prevent two runs overlapping — Terraform holds a state lock during a run
# and a second concurrent run would fail waiting to acquire it.
concurrency:
  group: "eks-provision-${{ github.event.inputs.environment || github.ref }}"
  cancel-in-progress: false

env:
  TF_VERSION:     "1.7.0"
  PYTHON_VERSION: "3.11"

# =============================================================================
# JOBS
# Each environment is a separate job. On a manual trigger only the selected
# environment's job runs — the others are skipped via their if: conditions.
# On a pull_request all three jobs run in plan-only mode.
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # LOG THE TRIGGER
  # Prints who triggered the run, why, and what will happen.
  # Useful for audit logs — visible in the GitHub Actions summary.
  # ---------------------------------------------------------------------------
  log-trigger:
    name: "Log trigger details"
    runs-on: ubuntu-latest
    steps:
      - name: "Print trigger information"
        run: |
          echo "======================================"
          echo "  EKS Provisioning Run"
          echo "======================================"
          echo "  Triggered by : ${{ github.actor }}"
          echo "  Trigger type : ${{ github.event_name }}"
          echo "  Environment  : ${{ github.event.inputs.environment || 'all changed (PR)' }}"
          echo "  Apply        : ${{ github.event.inputs.apply || 'false (PR - plan only)' }}"
          echo "  Reason       : ${{ github.event.inputs.reason || 'Pull request check' }}"
          echo "  Commit SHA   : ${{ github.sha }}"
          echo "  Branch/ref   : ${{ github.ref }}"
          echo "======================================"

  # ---------------------------------------------------------------------------
  # DETECT CHANGES (pull request only)
  # On pull requests, checks which environment directories have changed so
  # we only plan the environments that are actually affected.
  # On manual triggers this job is skipped — the selected environment runs
  # directly based on the workflow_dispatch input.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: "Detect changed environments (PR only)"
    runs-on: ubuntu-latest
    needs: log-trigger
    if: github.event_name == 'pull_request'
    outputs:
      dev:     ${{ steps.filter.outputs.dev }}
      staging: ${{ steps.filter.outputs.staging }}
      prod:    ${{ steps.filter.outputs.prod }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dev:
              - 'terraform/environments/dev/**'
              - 'ansible/environments/dev/**'
              - 'ansible/roles/provision_eks/**'
              - 'terraform/modules/**'
            staging:
              - 'terraform/environments/staging/**'
              - 'ansible/environments/staging/**'
              - 'ansible/roles/provision_eks/**'
              - 'terraform/modules/**'
            prod:
              - 'terraform/environments/prod/**'
              - 'ansible/environments/prod/**'
              - 'ansible/roles/provision_eks/**'
              - 'terraform/modules/**'

  # ===========================================================================
  # PROVISION DEV
  # Runs when:
  #   - Manual trigger with environment = dev
  #   - Pull request that changed dev environment files (plan only)
  #
  # Never auto-applies — all applies are initiated manually via workflow_dispatch
  # with apply set to true.
  # ===========================================================================
  provision-dev:
    name: "Provision EKS - Dev"
    needs: [log-trigger, detect-changes]
    # Run if:
    #   a) Manual trigger targeting dev, OR
    #   b) Pull request where dev files changed
    # The always() + detect-changes being skippable on manual runs is handled
    # by checking github.event_name directly.
    if: |
      always() && !failure() && !cancelled() &&
      (
        github.event.inputs.environment == 'dev' ||
        (github.event_name == 'pull_request' && needs.detect-changes.outputs.dev == 'true')
      )
    runs-on: ubuntu-latest
    steps:

      # Step 1: Clone the repository
      - name: "Checkout repository"
        uses: actions/checkout@v4

      # Step 2: Exchange GitHub OIDC JWT for temporary AWS credentials.
      #         Writes AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
      #         and AWS_SESSION_TOKEN into the environment.
      - name: "Authenticate to AWS via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: "eks-dev-${{ github.run_id }}"
          aws-region:        ${{ vars.AWS_REGION || 'us-east-1' }}

      # Step 3: Install Terraform so Ansible can invoke it as a shell command
      - name: "Install Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 4: Install Python, Ansible, and required libraries
      - name: "Install Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: "Install Ansible and AWS Python libraries"
        run: pip install ansible boto3 botocore kubernetes

      # Step 5: Run the EKS provisioning playbook for dev.
      #         On a manual trigger: applies if apply=true was selected.
      #         On a pull request:   always plan-only (terraform_apply=false).
      - name: "Run EKS provisioning playbook - dev"
        working-directory: ansible
        run: |
          ansible-playbook playbook-eks.yml \
            -e "target_env=dev" \
            -e "terraform_apply=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && 'true' || 'false' }}"

  # ===========================================================================
  # PROVISION STAGING
  # Runs when:
  #   - Manual trigger with environment = staging
  #   - Pull request that changed staging environment files (plan only)
  #
  # Staging is fully independent of dev when triggered manually.
  # You do not need to run dev first — each environment is self-contained.
  # ===========================================================================
  provision-staging:
    name: "Provision EKS - Staging"
    needs: [log-trigger, detect-changes]
    if: |
      always() && !failure() && !cancelled() &&
      (
        github.event.inputs.environment == 'staging' ||
        (github.event_name == 'pull_request' && needs.detect-changes.outputs.staging == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Authenticate to AWS via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: "eks-staging-${{ github.run_id }}"
          aws-region:        ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: "Install Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Install Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: "Install Ansible and AWS Python libraries"
        run: pip install ansible boto3 botocore kubernetes

      - name: "Run EKS provisioning playbook - staging"
        working-directory: ansible
        run: |
          ansible-playbook playbook-eks.yml \
            -e "target_env=staging" \
            -e "terraform_apply=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && 'true' || 'false' }}"

  # ===========================================================================
  # PROVISION PROD
  # Runs when:
  #   - Manual trigger with environment = prod (after reviewer approval)
  #   - Pull request that changed prod environment files (plan only, no approval needed)
  #
  # APPROVAL GATE
  # The 'prod' GitHub Environment must have Required Reviewers configured:
  #   Settings -> Environments -> prod -> Required Reviewers -> add your team
  # GitHub will pause this job and send an approval request before continuing.
  # The job only proceeds after a reviewer clicks Approve in the GitHub UI.
  #
  # Prod NEVER applies automatically — only via manual workflow_dispatch
  # with apply=true AND after a reviewer has approved the job.
  # ===========================================================================
  provision-prod:
    name: "Provision EKS - Prod"
    needs: [log-trigger, detect-changes]
    if: |
      always() && !failure() && !cancelled() &&
      (
        github.event.inputs.environment == 'prod' ||
        (github.event_name == 'pull_request' && needs.detect-changes.outputs.prod == 'true')
      )
    runs-on: ubuntu-latest
    # The environment: prod line is what triggers the GitHub approval gate.
    # On pull requests the approval gate still activates — remove the
    # environment: line and add a separate pr-prod job if you want PR plans
    # to run without requiring approval.
    environment: prod
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Authenticate to AWS via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: "eks-prod-${{ github.run_id }}"
          aws-region:        ${{ vars.AWS_REGION || 'eu-central-1' }}

      - name: "Install Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: "Install Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: "Install Ansible and AWS Python libraries"
        run: pip install ansible boto3 botocore kubernetes

      - name: "Run EKS provisioning playbook - prod"
        working-directory: ansible
        # apply=true is only honoured on a manual workflow_dispatch.
        # A PR targeting prod will always be plan-only regardless of inputs.
        run: |
          ansible-playbook playbook-eks.yml \
            -e "target_env=prod" \
            -e "terraform_apply=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' && 'true' || 'false' }}"
