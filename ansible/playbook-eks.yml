---
# ansible/playbook-eks.yml
# Playbook 1 — Provision EKS via Terraform.
# A single play loads the correct environment vars via include_vars,
# then hands off to the provision_eks role.
#
# Usage:
#   ansible-playbook playbook-eks.yml -i inventory/hosts.yml -e "target_env=dev"
#   ansible-playbook playbook-eks.yml -i inventory/hosts.yml -e "target_env=dev terraform_apply=true"

- name: "Provision EKS"
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:

    - name: "Validate target_env"
      ansible.builtin.assert:
        that:
          - target_env is defined
          - target_env in ['dev', 'staging', 'prod']
        fail_msg: "target_env must be dev, staging, or prod. Pass with: -e 'target_env=dev'"

    - name: "Load vars for {{ target_env }}"
      ansible.builtin.include_vars:
        file: "environments/{{ target_env }}/vars.yml"

    - name: "Show run parameters"
      ansible.builtin.debug:
        msg: "Environment: {{ target_env }} | Apply: {{ terraform_apply | default(false) }}"

  roles:
    - role: provision_eks
