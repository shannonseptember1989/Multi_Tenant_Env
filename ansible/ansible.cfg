# =============================================================================
# ansible/ansible.cfg
# =============================================================================
# Ansible reads this file automatically when you run ansible-playbook from
# the ansible/ directory. Both workflows set working-directory: ansible so
# this file is always found.
#
# KEY SETTINGS
#   inventory    — tells Ansible where to find the hosts file
#   roles_path   — tells Ansible where to find roles (provision_eks, deploy_wordpress)
# =============================================================================

[defaults]
inventory            = inventory/hosts
roles_path           = roles
host_key_checking    = False
retry_files_enabled  = False
stdout_callback      = yaml
interpreter_python   = auto_silent
deprecation_warnings = False
display_skipped_hosts = False

[ssh_connection]
pipelining = True
